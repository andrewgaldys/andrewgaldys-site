<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Galdys</title>

  <!-- Classy serif + clean sans -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0d0d;
      --card: #151515;
      --text: #f5f5f5;
      --muted: #b0b0b0;
      --border: #2a2a2a;
      --accent: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, #1a1a1a 0%, #0d0d0d 100%);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 34px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    .headshot {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 22px;
      border: 2px solid var(--border);
    }

    h1 {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .subtitle {
      max-width: 560px;
      margin: 18px auto 0;
      font-size: 1.08rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 26px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.18s ease;
      min-width: 150px;
      letter-spacing: 0.01em;
    }

    .button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .button-primary {
      background: var(--accent);
      color: #000000;
    }

    .button-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .button-secondary:hover {
      border-color: #444;
    }

    @media (max-width: 640px) {
      .card {
        padding: 32px 22px;
        border-radius: 20px;
      }

      .headshot {
        width: 112px;
        height: 112px;
        margin-bottom: 18px;
      }

      .subtitle {
        font-size: 1rem;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="headshot" src="headshot.jpg" alt="Andrew Galdys headshot" />
    <h1>Andrew Galdys</h1>
    <p class="subtitle">Economics student and investor writing consistently about macro trends, equities, and global events.</p>
    <div class="button-row">
      <a class="button button-primary" href="https://substack.com/@drewgaldys/posts" target="_blank" rel="noopener noreferrer">Subscribe</a>
      <a class="button button-secondary" href="https://www.linkedin.com/in/andrewgaldys/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    </div>
  </main>
</body>
</html>
