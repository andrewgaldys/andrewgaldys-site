<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Galdys</title>
  <style>
    :root {
      --bg: #070d18;
      --bg-soft: #0a1324;
      --card: #0b1220;
      --text: #f4efe4;
      --muted: #cfc6b4;
      --border: rgba(244, 239, 228, 0.12);
      --primary-bg: #f4efe4;
      --primary-text: #0c172a;
      --secondary-bg: transparent;
      --secondary-text: #f4efe4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--text);
      font-family: Garamond, Baskerville, Georgia, serif;
    }

    .card {
      width: 100%;
      max-width: 980px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(4px);
    }

    .hero {
      display: grid;
      grid-template-columns: 280px 1fr;
      align-items: center;
      gap: 36px;
    }

    .image-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .headshot {
      width: 280px;
      height: 280px;
      object-fit: cover;
      object-position: center 40%;
      border-radius: 18px;
      display: block;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid var(--border);
      transform: scale(1.04);
    }

    .content {
      text-align: left;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.2rem);
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .description {
      margin: 18px 0 0;
      max-width: 560px;
      font-size: 1.14rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      padding: 14px 26px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      font-family: Garamond, Baskerville, Georgia, serif;
    }

    .button:hover {
      transform: translateY(-2px);
      opacity: 0.97;
    }

    .button-primary {
      background: var(--primary-bg);
      color: var(--primary-text);
      border: 1px solid rgba(244, 239, 228, 0.15);
    }

    .button-secondary {
      background: var(--secondary-bg);
      color: var(--secondary-text);
      border: 1px solid var(--border);
    }

    .button-secondary:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(244, 239, 228, 0.28);
    }

    @media (max-width: 820px) {
      .card {
        padding: 28px 22px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .content {
        text-align: center;
      }

      .description {
        margin-left: auto;
        margin-right: auto;
      }

      .actions {
        justify-content: center;
      }

      .headshot {
        width: 230px;
        height: 230px;
      }
    }

    @media (max-width: 520px) {
      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="hero">
      <div class="image-wrap">
        <img src="headshot.jpg" alt="Andrew Galdys headshot" class="headshot" />
      </div>
      <div class="content">
        <h1>Andrew Galdys</h1>
        <p class="description">Economics student and investor writing about macro trends, equities, and global events.</p>
        <div class="actions">
          <a class="button button-primary" href="https://substack.com/@drewgaldys/posts" target="_blank" rel="noopener noreferrer">Subscribe</a>
          <a class="button button-secondary" href="https://www.linkedin.com/in/andrewgaldys/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
