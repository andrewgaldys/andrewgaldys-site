<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Galdys</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --text: #111111;
      --muted: #5c5c5c;
      --border: #d9d9d4;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }

    .headshot {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 22px;
      border: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      max-width: 560px;
      margin: 16px auto 0;
      font-size: 1.07rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.98rem;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
      min-width: 150px;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      background: var(--text);
      color: #ffffff;
    }

    .button-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    @media (max-width: 640px) {
      .card {
        padding: 32px 22px;
        border-radius: 20px;
      }

      .headshot {
        width: 112px;
        height: 112px;
        margin-bottom: 18px;
      }

      .subtitle {
        font-size: 1rem;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="headshot" src="headshot.jpg" alt="Andrew Galdys headshot" />
    <h1>Andrew Galdys</h1>
    <p class="subtitle">Economics student and investor writing consistently about macro trends, equities, and global events.</p>
    <div class="button-row">
      <a class="button button-primary" href="https://substack.com/@drewgaldys/posts" target="_blank" rel="noopener noreferrer">Subscribe</a>
      <a class="button button-secondary" href="https://www.linkedin.com/in/andrewgaldys/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    </div>
  </main>
</body>
</html>
